name: Auto Commit Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-autocommit:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip autocommit]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "chore: auto-commit build sync [skip autocommit]"
          git push
